<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Apps</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17202a;
        --muted: #5f6b7a;
        --line: #d8dee8;
        --paper: #f7f8fb;
        --panel: #ffffff;
        --accent: #0f766e;
        --accent-dark: #115e59;
        --warm: #b45309;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: var(--paper);
        color: var(--ink);
      }

      main {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      header {
        margin-bottom: 32px;
      }

      p {
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
        margin: 0;
      }

      .eyebrow {
        color: var(--accent-dark);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(2.2rem, 6vw, 4.4rem);
        line-height: 1;
        margin: 12px 0 16px;
        max-width: 820px;
      }

      .apps {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .app-card {
        display: flex;
        min-height: 270px;
        flex-direction: column;
        justify-content: space-between;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: inherit;
        text-decoration: none;
        transition:
          border-color 160ms ease,
          transform 160ms ease,
          box-shadow 160ms ease;
      }

      .app-card:hover,
      .app-card:focus-visible {
        border-color: var(--accent);
        box-shadow: 0 16px 40px rgb(15 118 110 / 0.12);
        outline: none;
        transform: translateY(-2px);
      }

      .tag {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 6px 10px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
      }

      h2 {
        margin: 18px 0 10px;
        font-size: clamp(1.45rem, 3vw, 2rem);
        line-height: 1.12;
      }

      .open {
        color: var(--accent-dark);
        font-weight: 800;
      }

      .memory .open {
        color: var(--warm);
      }

      @media (max-width: 760px) {
        main {
          padding: 36px 0;
        }

        .apps {
          grid-template-columns: 1fr;
        }

        .app-card {
          min-height: 230px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Codex Apps</p>
        <h1>選擇要開啟的專案</h1>
        <p>這裡收錄兩個由 Codex 協作完成的網頁 app。</p>
      </header>

      <section class="apps" aria-label="available apps">
        <a class="app-card" href="./teaching-consultant-english-coach/">
          <div>
            <span class="tag">English Practice</span>
            <h2>教學顧問英文陪練器</h2>
            <p>用於練習教學觀察、課堂回饋與教育討論的英文表達。</p>
          </div>
          <span class="open">開啟專案</span>
        </a>

        <a class="app-card memory" href="./memory-drawer/">
          <div>
            <span class="tag">Memory Tool</span>
            <h2>回憶抽屜</h2>
            <p>一個以回憶、文字與互動整理為核心的小型網頁 app。</p>
          </div>
          <span class="open">開啟專案</span>
        </a>
      </section>
    </main>
  </body>
</html>
